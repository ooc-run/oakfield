name: Deploy API Docs

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build-docs:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install docs tools
        run: |
          sudo apt-get update
          sudo apt-get install -y doxygen graphviz ninja-build

      - name: Configure docs build
        run: >
          cmake -S . -B build-docs -G Ninja
          -DOAKFIELD_BUILD_DOCS=ON
          -DOAKFIELD_BUILD_TESTS=OFF
          -DOAKFIELD_BUILD_EXAMPLES=OFF
          -DOAKFIELD_BUILD_BENCHMARKS=OFF

      - name: Build API docs
        run: cmake --build build-docs --target oakfield_docs

      - name: Disable Jekyll
        run: touch build-docs/docs/api/html/.nojekyll

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: build-docs/docs/api/html

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build-docs

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

